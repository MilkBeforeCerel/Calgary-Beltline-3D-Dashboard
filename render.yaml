services:
  - type: web
    name: masiv-3d-city-dashboard-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_SOURCE_MODE
        value: auto
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LLM_API_KEY
        sync: false
